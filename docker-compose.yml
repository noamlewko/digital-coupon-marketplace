version: "3.9"

services:
  mongo:
    image: mongo:7
    container_name: coupon-mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  backend:
    build: ./backend
    container_name: coupon-backend
    ports:
      - "3000:3000"
    environment:
      PORT: 3000
      MONGO_URI: mongodb://mongo:27017/coupon_marketplace
      ADMIN_TOKEN: admin-token-123
      RESELLER_TOKEN: reseller-token-123
    depends_on:
      - mongo

volumes:
  mongo_data: