services:
  mongo:
    image: mongo:7
    container_name: coupon-mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  backend:
    build: ./backend
    container_name: coupon-backend
    ports:
      - "3000:3000"
    environment:
      PORT: 3000
      MONGO_URI: mongodb://mongo:27017/coupon_marketplace
      ADMIN_TOKEN: ${ADMIN_TOKEN:-admin-demo-token}
      RESELLER_TOKEN: ${RESELLER_TOKEN:-reseller-demo-token}
      FRONTEND_ORIGIN: http://localhost:5173
    depends_on:
      - mongo

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_BASE: ${VITE_API_BASE:-http://localhost:3000}
        VITE_ADMIN_TOKEN: ${ADMIN_TOKEN:-admin-demo-token}
        VITE_RESELLER_TOKEN: ${RESELLER_TOKEN:-reseller-demo-token}
    container_name: coupon-frontend
    ports:
      - "5173:80"
    depends_on:
      - backend

volumes:
  mongo_data: